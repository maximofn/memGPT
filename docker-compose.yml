services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memgpt-postgres
    environment:
      POSTGRES_USER: memgpt
      POSTGRES_PASSWORD: memgpt
      POSTGRES_DB: memgpt
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memgpt -d memgpt"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26
    container_name: memgpt-neo4j
    environment:
      NEO4J_AUTH: neo4j/memgptmemgpt
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
